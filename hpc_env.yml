# =================================================================
# Unified HPC environment for GFM-Safety
# Target: UF HiPerGator, NVIDIA L4 / B200, CUDA 12.1+
# Supports: GraphMAE (DGL) + BGRL (PyG) + eval + SBERT preprocessing
# =================================================================
#
# Install:
#   conda env create -f hpc_env.yml
#   conda activate gfm_safety
#
# Hard-lock versions:
#   torch == 2.4.0 + cu121
#   dgl == 2.4.0 + cu121
# =================================================================

name: gfm_safety
channels:
  - pytorch
  - nvidia
  - dglteam/label/th24_cu121
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - setuptools
  - wheel

  # --- CUDA toolkit (conda-managed, matches cu121) ---
  - nvidia::cuda-toolkit=12.1

  # --- PyTorch 2.4.0 + CUDA 12.1 (from pytorch channel) ---
  - pytorch::pytorch=2.4.0
  - pytorch::torchvision=0.19.0
  - pytorch::torchaudio=2.4.0
  - pytorch::pytorch-cuda=12.1

  # --- DGL 2.4.0 + CUDA 12.1 (from dglteam channel) ---
  - dglteam/label/th24_cu121::dgl=2.4.0

  # --- Scientific computing ---
  - numpy<2
  - scipy
  - scikit-learn
  - pandas
  - networkx
  - tqdm
  - pyyaml

  # --- pip-only packages ---
  - pip:
    # PyG and extensions (must match torch 2.4.0 + cu121)
    - torch-geometric==2.6.1
    - torch-scatter
    - torch-sparse
    - torch-cluster
    # OGB datasets
    - ogb==1.3.6
    # TensorBoard logging
    - tensorboardX
    # SBERT feature encoding (needed for preprocessing, optional at train time)
    - sentence-transformers>=3.0
